[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# startCommand intentionally omitted — the Dockerfile CMD already wraps
# uvicorn in `sh -c` so ${PORT} expands correctly. Setting startCommand
# here would override CMD and bypass shell expansion, causing uvicorn to
# receive the literal string "$PORT" as the port argument.
[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
